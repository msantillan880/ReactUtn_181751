<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clase 2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-logo">
    <header>
      <h1>Tarea Clase 2 - JavaScript</h1>
    </header>
    <main id="main-content" class="main">
      <figure>
        <img src="logo.png" alt="Logo de React" class="art-image" />
      </figure>

      <section aria-labelledby="formulario">
        <h1 id="formulario" align="center">Registro al Evento</h1>
        <form
          class="form-contact"
          action="https://httpbin.org/post"
          method="POST"
        >
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ingrese su nombre"
            required
          />

          <label for="edad">Edad</label>
          <input
            type="number"
            id="edad"
            name="edad"
            placeholder="Ingrese su edad"
            required
          />

          <button id="btnEnviar" type="submit">Enviar</button>
        </form>
      </section>

      <script src="app.js"></script>
    </main>

    <h1>
      <p id="mensaje" align="center"></p>
    </h1>

    <footer class="footer">
      <small>Marcelo Santillán Curso Utn React 181751 © 2026</small>
    </footer>
  </body>
</html>
